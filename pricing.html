<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Signy - シンプルな料金プラン。FREE(月5件) + PRO(月額550円/無制限)。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signy - Pricing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00e0a0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='6' fill='%2309090b' stroke='%2300e0a0' stroke-width='2'/><path d='M10 20C10 20 12 22 16 22C20 22 22 20 22 20' stroke='%2300e0a0' stroke-width='2' stroke-linecap='round'/></svg>">
  <script>(function(){var t=localStorage.getItem("signy-theme");if(!t)t=matchMedia("(prefers-color-scheme:light)").matches?"light":"dark";document.documentElement.setAttribute("data-theme",t)})()</script>
  <link rel="stylesheet" href="/css/style.css">
  <meta property="og:title" content="Signy 料金プラン — 月額550円で電子署名し放題">
  <meta property="og:description" content="FREE（月5件無料）とPRO（月額550円・署名無制限）の2プラン。いつでも解約可能。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://signy.mamonis.studio/pricing.html">
  <link rel="canonical" href="https://signy.mamonis.studio/pricing.html">
</head>
<body>
  <header class="header"><div class="header__inner">
    <a href="/" class="header__logo" id="logo"></a>
    <nav class="header__nav"><a href="/" class="header__link" data-i18n="nav.dashboard"></a><button class="theme-toggle" aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button class="lang-toggle" aria-label="Switch language">EN</button>
      </nav>
  </div></header>
  <main><section style="padding:80px 0"><div class="container" style="max-width:800px">
    <h1 class="text-center mb-8" style="font-size:2rem" data-i18n="price.title"></h1>
    <p class="text-center text-muted mb-48" style="max-width:480px;margin:0 auto" data-i18n="price.sub"></p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px" id="pGrid">
      <!-- FREE -->
      <div class="card" style="padding:32px 28px">
        <div style="font-size:.85rem;font-weight:700;color:var(--tx2)" data-i18n="price.free.name"></div>
        <div style="font-family:var(--font-mono);font-size:2.5rem;font-weight:700;line-height:1.1"><span style="font-size:1.2rem">&yen;</span><span data-i18n="price.free.price"></span><span style="font-size:.85rem;font-weight:400;color:var(--tx2)" data-i18n="price.mo"></span></div>
        <p class="text-muted" style="font-size:.8rem;margin:8px 0 20px" data-i18n="price.free.desc"></p>
        <ul style="list-style:none;padding:0;margin:0 0 24px;font-size:.85rem" class="feat-list">
          <li data-i18n="price.free.f1"></li><li data-i18n="price.free.f3"></li>
          <li data-i18n="price.free.f2"></li><li data-i18n="price.free.f5"></li>
          <li data-i18n="price.free.f4"></li><li data-i18n="price.free.f6"></li>
        </ul>
        <a href="/login.html" class="btn btn--secondary btn--block" data-i18n="price.cta.free"></a>
      </div>
      <!-- PRO -->
      <div class="card" style="padding:32px 28px;border:2px solid var(--ac);position:relative">
        <span style="position:absolute;top:-12px;right:20px;font-size:.7rem;font-weight:700;color:#fff;background:var(--ac);padding:4px 14px;border-radius:100px" data-i18n="price.pro.badge"></span>
        <div style="font-size:.85rem;font-weight:700;color:var(--tx2)" data-i18n="price.pro.name"></div>
        <div style="font-family:var(--font-mono);font-size:2.5rem;font-weight:700;line-height:1.1"><span style="font-size:1.2rem">&yen;</span><span data-i18n="price.pro.price"></span><span style="font-size:.85rem;font-weight:400;color:var(--tx2)" data-i18n="price.pro.tax"></span></div>
        <p class="text-muted" style="font-size:.8rem;margin:8px 0 20px" data-i18n="price.pro.desc"></p>
        <ul style="list-style:none;padding:0;margin:0 0 24px;font-size:.85rem" class="feat-list">
          <li><strong style="color:var(--ac)" data-i18n="price.pro.f1"></strong></li>
          <li data-i18n="price.pro.f5"></li><li data-i18n="price.pro.f6"></li>
          <li data-i18n="price.pro.f2"></li><li data-i18n="price.pro.f3"></li>
          <li data-i18n="price.pro.f7"></li><li data-i18n="price.pro.f4"></li>
        </ul>
        <button class="btn btn--primary btn--block" id="proBtn" onclick="subscribe()" data-i18n="price.cta.pro"></button>
      </div>
    </div>
    <p class="text-center text-muted mt-48" style="font-size:.85rem" data-i18n="price.note"></p>
    <div class="text-center"><button class="btn btn--ghost mt-16" id="manageBtn" style="display:none" onclick="manage()" data-i18n="price.manage"></button></div>
  </div></section></main>
  <footer class="footer"><p class="footer__text" data-i18n="footer"></p><div class="footer__links">
    <a href="https://mamonis.studio/privacy_policy" data-i18n="footer.priv"></a>
    <a href="https://mamonis.studio/terms_of_use" data-i18n="footer.terms"></a>
    <a href="https://mamonis.studio/tokushoho" data-i18n="footer.law"></a>
      <a href="/legal/e-books-act.html" data-i18n="footer.ebooks"></a>
  </div></footer>
  <script src="/js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded',()=>{
    const{Logo,applyI18n,isLoggedIn,getUser,t}=Signy;
    document.title=t('meta.title.pricing');
    document.getElementById('logo').innerHTML=`${Logo}<span class="header__logo-text">Signy</span>`;
    applyI18n();
    document.querySelectorAll('.feat-list li').forEach(li=>{li.style.padding='5px 0 5px 20px';li.style.position='relative';
      const dot=document.createElement('span');dot.style.cssText='position:absolute;left:0;top:10px;width:8px;height:8px;border-radius:50%;background:var(--ac);opacity:.5';li.prepend(dot);
    });
    if(isLoggedIn()){const u=getUser();if(u?.plan==='pro'){document.getElementById('proBtn').textContent=t('price.current');document.getElementById('proBtn').disabled=true;document.getElementById('proBtn').style.opacity='.5';document.getElementById('manageBtn').style.display='inline-block'}}
  });
  async function subscribe(){if(!Signy.isLoggedIn()){location.href='/login.html';return}try{const r=await Signy.api('/stripe/checkout',{method:'POST',body:JSON.stringify({})});if(r.url)location.href=r.url}catch(e){Signy.toast(e.message,'error')}}
  async function manage(){try{const r=await Signy.api('/stripe/portal',{method:'POST'});if(r.url)location.href=r.url}catch(e){Signy.toast(e.message,'error')}}
  </script>
  <style>@media(max-width:640px){#pGrid{grid-template-columns:1fr!important}}</style>
</body>
</html>
