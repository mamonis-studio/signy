<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Signy - 署名が完了しました。">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signy — 署名完了</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00e0a0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='6' fill='%2309090b' stroke='%2300e0a0' stroke-width='2'/><path d='M10 20C10 20 12 22 16 22C20 22 22 20 22 20' stroke='%2300e0a0' stroke-width='2' stroke-linecap='round'/></svg>">
  <script>(function(){var t=localStorage.getItem("signy-theme");if(!t)t=matchMedia("(prefers-color-scheme:light)").matches?"light":"dark";document.documentElement.setAttribute("data-theme",t)})()</script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header"><div class="header__inner">
    <a href="/" class="header__logo" id="logo"></a>
    <nav class="header__nav"><button class="theme-toggle" aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button class="lang-toggle" aria-label="Switch language">EN</button>
      </nav>
  </div></header>

  <main><section class="complete"><div class="container container--narrow">
    <div class="complete__icon" id="cIcon"></div>
    <h1 class="complete__title" data-i18n="complete.title"></h1>
    <p class="complete__desc" data-i18n="complete.desc"></p>
    <div class="complete__actions">
      <a href="#" class="btn btn--primary" id="dlBtn"></a>
      <a href="/" class="btn btn--secondary" data-i18n="complete.back"></a>
    </div>
  </div></section></main>

  <footer class="footer">
    <p class="footer__text" data-i18n="footer"></p>
    <div class="footer__links">
      <a href="https://mamonis.studio/privacy_policy" data-i18n="footer.priv"></a>
      <a href="https://mamonis.studio/terms_of_use" data-i18n="footer.terms"></a>
      <a href="https://mamonis.studio/tokushoho" data-i18n="footer.law"></a>
      <a href="/legal/e-books-act.html" data-i18n="footer.ebooks"></a>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const {I, Logo, t} = Signy;
    document.title = t('meta.title.complete');
    document.getElementById('logo').innerHTML = `${Logo}<span class="header__logo-text">Signy</span>`;
    document.getElementById('cIcon').innerHTML = I.checkCircle;
    document.getElementById('dlBtn').innerHTML = `${I.download}<span data-i18n="complete.dl"></span>`;
    Signy.applyI18n();
    const p = new URLSearchParams(location.search);
    const id = p.get('id'), tk = p.get('token');
    if (id && tk) document.getElementById('dlBtn').href = `/api/documents/${id}/download?token=${tk}`;
  });
  </script>
</body>
</html>
