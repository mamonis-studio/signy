<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Signy - ログイン。メールアドレスだけで始められます。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signy — ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00e0a0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='6' fill='%2309090b' stroke='%2300e0a0' stroke-width='2'/><path d='M10 20C10 20 12 22 16 22C20 22 22 20 22 20' stroke='%2300e0a0' stroke-width='2' stroke-linecap='round'/></svg>">
  <script>(function(){var t=localStorage.getItem("signy-theme");if(!t)t=matchMedia("(prefers-color-scheme:light)").matches?"light":"dark";document.documentElement.setAttribute("data-theme",t)})()</script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header"><div class="header__inner">
    <a href="/" class="header__logo" id="logo"></a>
    <nav class="header__nav">
      <a href="/pricing.html" class="header__link" data-i18n="nav.pricing"></a>
      <button class="theme-toggle" aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button class="lang-toggle" aria-label="Switch language">EN</button>
    </nav>
  </div></header>

  <main>
    <div id="loginView">
      <div class="auth-box card">
        <h2 class="auth-box__title" data-i18n="auth.title"></h2>
        <div class="flex flex-col gap-16">
          <div class="form-group">
            <label class="form-label" for="em" data-i18n="auth.email"></label>
            <input type="email" class="form-input" id="em" data-i18n-attr="placeholder:auth.email.ph" autocomplete="email">
          </div>
          <button class="btn btn--primary btn--block" id="loginBtn"></button>
        </div>
      </div>
    </div>

    <div id="sentView" style="display:none">
      <div class="auth-box card text-center">
        <div id="sentIcon" style="width:48px;height:48px;margin:0 auto 16px;color:var(--ac)"></div>
        <h2 class="mb-8" data-i18n="auth.title"></h2>
        <p data-i18n="auth.sent"></p>
      </div>
    </div>

    <div id="authView" style="display:none">
      <div class="auth-box text-center">
        <div class="loader loader--lg" style="margin:0 auto 16px"></div>
        <p data-i18n="auth.checking"></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__text" data-i18n="footer"></p>
    <div class="footer__links">
      <a href="https://mamonis.studio/privacy_policy" data-i18n="footer.priv"></a>
      <a href="https://mamonis.studio/terms_of_use" data-i18n="footer.terms"></a>
      <a href="https://mamonis.studio/tokushoho" data-i18n="footer.law"></a>
      <a href="/legal/e-books-act.html" data-i18n="footer.ebooks"></a>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const {I, Logo, api, setToken, isLoggedIn, toast, t, applyI18n} = Signy;
    document.title = t('meta.title.login');
    document.getElementById('logo').innerHTML = `${Logo}<span class="header__logo-text">Signy</span>`;
    document.getElementById('sentIcon').innerHTML = I.mail;
    document.getElementById('loginBtn').innerHTML = `${I.mail}<span data-i18n="auth.submit"></span>`;
    applyI18n();

    if (isLoggedIn()) { location.href = '/'; return; }

    const params = new URLSearchParams(location.search);
    const authTk = params.get('token');
    if (authTk) {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('authView').style.display = 'block';
      verify(authTk);
      return;
    }

    const btn = document.getElementById('loginBtn');
    const em = document.getElementById('em');

    btn.addEventListener('click', async () => {
      const email = em.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast(t('toast.email.invalid'), 'error'); return; }
      btn.disabled = true;
      try {
        await api('/auth/magic-link', { method: 'POST', body: JSON.stringify({ email }) });
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('sentView').style.display = 'block';
      } catch (e) {
        toast(e.message || t('err'), 'error'); btn.disabled = false;
      }
    });

    em.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });

    async function verify(token) {
      try {
        const d = await api('/auth/verify', { method: 'POST', body: JSON.stringify({ token }) });
        setToken(d.sessionToken);
        location.href = '/';
      } catch {
        toast(t('auth.failed'), 'error');
        setTimeout(() => {
          document.getElementById('authView').style.display = 'none';
          document.getElementById('loginView').style.display = 'block';
        }, 1500);
      }
    }
  });
  </script>
</body>
</html>
