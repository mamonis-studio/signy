<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signy — 料金プラン</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header"><div class="header__inner">
    <a href="/" class="header__logo" id="logo"></a>
    <nav class="header__nav">
      <a href="/" class="header__link" data-i18n="nav.dashboard"></a>
      <a href="/login.html" class="header__link" data-auth="login" data-i18n="nav.login"></a>
      <button class="lang-toggle">EN</button>
    </nav>
  </div></header>

  <main><section class="pricing"><div class="container">
    <div class="text-center">
      <h1 data-i18n="price.title"></h1>
      <p class="mt-8" data-i18n="price.sub"></p>
    </div>
    <div class="pricing__grid" id="grid"></div>
    <div class="text-center mt-32" id="manageArea" style="display:none">
      <p class="text-muted mb-16" id="currentPlanText"></p>
      <button class="btn btn--secondary" onclick="manageSubscription()" data-i18n="price.manage"></button>
    </div>
  </div></section></main>

  <footer class="footer">
    <p class="footer__text" data-i18n="footer"></p>
    <div class="footer__links">
      <a href="#" data-i18n="footer.priv"></a>
      <a href="#" data-i18n="footer.terms"></a>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const {I, Logo, t, applyI18n} = Signy;
    document.getElementById('logo').innerHTML = `${Logo}<span class="header__logo-text">Signy</span>`;

    const ck = I.check;
    const plans = [
      {name:'FREE', price:'¥0', yr:'price.free.yr', feats:['price.free.f1','price.free.f2','price.free.f3','price.free.f4'], cta:'price.cta.free', cls:'btn--secondary', plan:null},
      {name:'BASIC', price:'¥980', yr:'price.basic.yr', feats:['price.basic.f1','price.basic.f2','price.basic.f3','price.basic.f4'], cta:'price.cta.basic', yearCta:'price.cta.basic.yr', cls:'btn--primary', featured:true, plan:'basic'},
      {name:'PRO', price:'¥2,980', yr:'price.pro.yr', feats:['price.pro.f1','price.pro.f2','price.pro.f3','price.pro.f4'], cta:'price.cta.pro', yearCta:'price.cta.pro.yr', cls:'btn--secondary', plan:'pro'},
    ];

    const grid = document.getElementById('grid');
    plans.forEach(p => {
      const featHtml = p.feats.map(f => `<li>${ck}<span data-i18n="${f}"></span></li>`).join('');
      grid.insertAdjacentHTML('beforeend', `
        <div class="card price-card ${p.featured?'price-card--featured':''}">
          <div class="price-card__name">${p.name}</div>
          <div class="price-card__price">${p.price} <span class="unit" data-i18n="price.mo"></span></div>
          <div class="price-card__annual" data-i18n="${p.yr}"></div>
          <ul class="price-card__features">${featHtml}</ul>
          ${p.plan
            ? `<div class="flex flex-col gap-8">
                <button class="btn ${p.cls} btn--block" onclick="checkout('${p.plan}','monthly')" data-i18n="${p.cta}"></button>
                <button class="btn btn--ghost btn--sm btn--block" onclick="checkout('${p.plan}','yearly')" data-i18n="${p.yearCta}"></button>
              </div>`
            : `<a href="/login.html" class="btn ${p.cls} btn--block" data-i18n="${p.cta}"></a>`
          }
        </div>`);
    });
    applyI18n();

    // Stripe Checkout
    window.checkout = async (plan, interval) => {
      if (!Signy.isLoggedIn()) { location.href = '/login.html'; return; }
      try {
        const { url } = await Signy.api('/stripe/checkout', {
          method: 'POST',
          body: JSON.stringify({ plan, interval }),
        });
        location.href = url;
      } catch (e) {
        Signy.toast(e.message || 'エラーが発生しました', 'error');
      }
    };

    // Portal (manage existing subscription)
    window.manageSubscription = async () => {
      try {
        const { url } = await Signy.api('/stripe/portal', { method: 'POST', body: '{}' });
        location.href = url;
      } catch (e) {
        Signy.toast(e.message || 'エラーが発生しました', 'error');
      }
    };

    // Show manage area for paid users
    const user = Signy.getUser();
    if (user && user.plan && user.plan !== 'free') {
      const area = document.getElementById('manageArea');
      area.style.display = 'block';
      document.getElementById('currentPlanText').textContent =
        Signy.lang === 'ja'
          ? `現在のプラン: ${user.plan.toUpperCase()}`
          : `Current plan: ${user.plan.toUpperCase()}`;
    }
  });
  </script>
</body>
</html>
